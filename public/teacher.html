<!doctype html><html lang="tr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Öğretmen - QuizRush PRO</title><link rel="stylesheet" href="/style.css"></head><body><header class="top"><a href="/">← Ana Menü</a><button id="themeBtn" class="ghost">🌙</button></header><main class="wrap dash"><section class="card"><h2>Öğretmen Paneli</h2><p class="muted">AI ile üret, manuel soru ekle, düzenle ve oda aç.</p><div class="form"><label>Konu<input id="topic" value="Güneş sistemi"></label><label>Sınıf<input id="grade" value="6"></label><label>Soru sayısı<input id="count" type="number" min="3" max="20" value="8"></label><label>Soru süresi<select id="seconds"><option>10</option><option selected>20</option><option>30</option><option>45</option><option>60</option></select></label></div><div class="form2" style="margin-top:12px"><label>Zorluk<select id="difficulty"><option>kolay</option><option selected>orta</option><option>zor</option></select></label><label>Oda başlığı<input id="title" value="QuizRush Canlı Quiz"></label></div><div class="actions"><button id="ai" class="primary">🤖 AI Soru Üret</button><button id="openManual" class="secondary">✍️ Manuel Soru Ekle</button><button id="example" class="ghost">⚡ Örnek Soru</button><button id="exportBtn" class="warning">📤 JSON Kopyala</button><button id="importBtn" class="ghost">📥 JSON Yapıştır</button><button id="room" class="success">🚀 Oda Aç</button></div><p id="status" class="status muted"></p></section><section class="card"><h3>Quiz Soruları</h3><div id="qs" class="list"></div></section><section id="roomBox" class="card hidden"><h3>Oda Hazır</h3><div id="code" class="code">000000</div><p class="muted">Öğrenciler bu kodla girecek.</p><div class="actions"><a id="host" class="btn primary">Oyunu Yönet</a><a id="join" class="btn secondary">Öğrenci Link</a></div></section></main><div id="modal" class="modal hidden"><div class="card modalBox"><h3 id="modalTitle">Manuel Soru</h3><label>Soru<textarea id="mQuestion" placeholder="Soru yaz"></textarea></label><div class="form2"><label>A<input id="mA"></label><label>B<input id="mB"></label><label>C<input id="mC"></label><label>D<input id="mD"></label></div><label>Doğru cevap<select id="mCorrect"><option value="0">A</option><option value="1">B</option><option value="2">C</option><option value="3">D</option></select></label><label>Açıklama<input id="mExp" placeholder="İsteğe bağlı"></label><div class="actions"><button id="saveManual" class="success">Kaydet</button><button id="closeManual" class="ghost">Kapat</button></div></div></div><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script><script src="/firebase.js"></script><script src="/theme.js"></script><script src="/teacher.js"></script></body></html>
